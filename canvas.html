<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Patagonia Fiel · Canvas</title>
<link rel="stylesheet" href="site.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  body { margin: 0; background: #ece7dd; font-family: 'Manrope', system-ui, sans-serif; }
  .frame {
    background: #faf6ee;
    box-shadow: 0 24px 60px -28px rgba(14,37,65,0.35), 0 1px 0 rgba(0,0,0,0.04);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .frame--desktop { width: 1440px; height: 2400px; }
  .frame--mobile { width: 390px; height: 1700px; border-radius: 28px; border: 8px solid #1a1d1f; }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  .frame--mobile iframe { border-radius: 18px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useEffect } = React;

function Frame({ src, kind = 'desktop' }) {
  return (
    <div className={"frame frame--" + kind}>
      <iframe src={src} loading="lazy" />
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="v2" title="Propuesta v2 — Fotos reales · Inmersiva">
        <DCArtboard id="v2-desktop" label="Desktop · 1440 — v2 con fotos" width={1440} height={2400}>
          <Frame src="index-v2.html" kind="desktop" />
        </DCArtboard>
        <DCArtboard id="v2-mobile" label="Mobile · 390 — v2 con fotos" width={406} height={1716}>
          <Frame src="index-v2.html" kind="mobile" />
        </DCArtboard>
      </DCSection>

      <DCSection id="responsive" title="Propuesta v1 — Editorial cálido">
        <DCArtboard id="desktop" label="Desktop · 1440 — Editorial cálido (Horizonte)" width={1440} height={1900}>
          <Frame src="index.html?hero=horizon" kind="desktop" />
        </DCArtboard>

        <DCArtboard id="mobile" label="Mobile · 390 — Editorial cálido (Horizonte)" width={406} height={1716}>
          <Frame src="index.html?hero=horizon" kind="mobile" />
        </DCArtboard>
      </DCSection>

      <DCSection id="hero-variations" title="Variaciones del Hero">
        <DCArtboard id="hero-photo" label="Hero — Foto Patagonia (overlay)" width={1440} height={900}>
          <Frame src="index.html?hero=photo&onlyHero=1" kind="desktop" />
        </DCArtboard>

        <DCArtboard id="hero-min" label="Hero — Mínimo / editorial" width={1440} height={900}>
          <Frame src="index.html?hero=minimal&onlyHero=1" kind="desktop" />
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile-vars" title="Variaciones Mobile">
        <DCArtboard id="m-photo" label="Mobile · Hero foto" width={406} height={1716}>
          <Frame src="index.html?hero=photo" kind="mobile" />
        </DCArtboard>
        <DCArtboard id="m-min" label="Mobile · Hero mínimo" width={406} height={1716}>
          <Frame src="index.html?hero=minimal" kind="mobile" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
